version: "3.9"

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama_container
    ports:
      - "11434:11434"      # expose Ollama API to host machine
    volumes:
      - ollama_data:/home/ollamauser/.ollama   # persist models
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=8,9
    restart: unless-stopped

  fastapi-app:
    build: .        # assuming your FastAPI Dockerfile is inside ./fastapi
    container_name: fastapi_container
    depends_on:
      - ollama
    ports:
      - "8009:8009"        # expose FastAPI app
    environment:
      - OLLAMA_HOST=http://ollama:11434   # service name "ollama"
    restart: unless-stopped
    volumes:
      - .:/app
    user: "appuser"
    #command: uvicorn app.main:app --host 0.0.0.0 --port 8009 --reload
    command: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8009 --workers 4 --timeout 300
volumes:
  ollama_data:
